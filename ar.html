<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR読み取り</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    .ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.95);
      padding: 12px;
      border-radius: 10px;
    }

    .back {
      display: inline-block;
      margin-top: 10px;
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
    }

    @media screen and (max-width: 768px) {
  .ui {
    font-size: 14px;
    padding: 10px;
  }

  .back {
    width: 100%;
    text-align: center;
  }
}
  </style>
</head>

<body>

<div class="ui">
  <h2>AR読み取り</h2>
  <p id="message">マーカーを読み取ってください</p>
  <a class="back" href="index.html">スタンプ帳へ戻る</a>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: false; precision: low; colorManagement: true;"
  arjs="
    sourceType: webcam;
    facingMode: environment;
    trackingMethod: best;
    debugUIEnabled: false;
  "
>

  <!-- カメラ（ズーム改善ポイント） -->
  <a-entity camera="fov: 80" position="0 0 0"></a-entity>

  <!-- マーカー -->
  <a-marker id="marker" preset="hiro">

    <!-- 軽量化＆表示安定 -->
    <a-box
      position="0 0.2 0"
      scale="0.4 0.4 0.4"
      color="red">
    </a-box>

  </a-marker>

</a-scene>

<script src="app.js"></script>

</body>
</html>
