<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR読み取り</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }

    .ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.95);
      padding: 12px;
      border-radius: 10px;
    }

    .back {
      display: inline-block;
      margin-top: 10px;
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="ui">
  <h2>AR読み取り</h2>

  <p id="message">マーカーを読み取ってください</p>

  <a class="back" href="index.html">スタンプ帳へ戻る</a>
</div>

<a-scene
  embedded
  renderer="logarithmicDepthBuffer: true; antialias: true; colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  arjs="
    trackingMethod: best;
    sourceType: webcam;
    facingMode: environment;
  "
>

  <!-- カメラ（重要：距離補正） -->
  <a-entity camera position="0 0 0"></a-entity>

  <!-- マーカー -->
  <a-marker id="marker" preset="hiro">

    <!-- 少し小さめにして“近さ感”を軽減 -->
    <a-box
      position="0 0.3 0"
      scale="0.5 0.5 0.5"
      color="red">
    </a-box>

  </a-marker>

</a-scene>

<script src="app.js"></script>

</body>
</html>
