<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR読み取り</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- ★CDNをjsDelivrの安定版に変更 -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }
    .ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }
    .back {
      display: inline-block;
      margin-top: 8px;
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      width: 100%;
      text-align: center;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<div class="ui">
  <div>AR読み取り</div>
  <div id="message">マーカーを読み取ってください</div>
  <a class="back" href="index.html">戻る</a>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: false; precision: low;"
  arjs="
    sourceType: webcam;
    facingMode: environment;
    trackingMethod: best;
    debugUIEnabled: false;
    sourceWidth: 640;
    sourceHeight: 480;
    displayWidth: 640;
    displayHeight: 480;
  "
>
  <!-- ★fovはapp.jsでPC/スマホ判定して動的に設定するためここでは指定しない -->
  <a-entity id="camera" camera position="0 0 0"></a-entity>

  <!-- マーカー -->
  <a-marker id="marker" preset="hiro">
    <a-box
      position="0 0.2 0"
      scale="0.35 0.35 0.35"
      color="red">
    </a-box>
  </a-marker>
</a-scene>

<script src="app.js"></script>
</body>
</html>
