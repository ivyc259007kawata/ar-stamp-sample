<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>スタンプ一覧</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main>
<h1>スタンプ一覧</h1>

<div id="stampList"></div>

<a href="index.html">
ホームへ戻る
</a>

</main>
<footer class="footer">
    <a href="index.html">ホーム</a>
    <a href="map.html">地図</a>
    <a href="stamp.html">スタンプ</a>
</footer>
<script>

const SPOTS = [
    { id:'jinja', label:'🏯 神社' },
    { id:'park', label:'🌸 公園' },
    { id: 'libra',  label: '📚 図書館' }
];

const stampList =
document.getElementById('stampList');

SPOTS.forEach(({id,label})=>{

    const clear =
    localStorage.getItem(id);

    const div =
    document.createElement('div');

    div.innerHTML = `
    <p>
        ${label}
        ${clear ? '✔取得済み' : '未取得'}
    </p>
    `;

    stampList.appendChild(div);

});

</script>

</body>
</html>
