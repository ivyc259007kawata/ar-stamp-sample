<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARスタンプラリー</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="hero">
        <img src="img/yuhuko.jpg" alt="学校写真">
    </header>

    <main>
        <div class="card">

            <h1>ARスタンプラリー</h1>

            <p id="progress"></p>

            <div id="spotList"></div>

            <div id="debugArea"></div>

        </div>
    </main>

    <footer class="footer">
        <a href="map.html">地図</a>
        <a href="index.html">ホーム</a>
        <a href="stamp.html">スタンプ</a>
    </footer>

    <script>

        // ★スポットを追加するときはここだけ編集
        const SPOTS = [
            { id: 'jinja', label: '🏯 神社' },
            { id: 'park', label: '🌸 公園' },
            { id: 'libra', label: '📚 図書館' },
        ];

        const spotList =
            document.getElementById("spotList");

        SPOTS.forEach(({ id, label }) => {

            const cleared =
                localStorage.getItem(id);

            const div =
                document.createElement('div');

            div.className = 'spot';

            div.innerHTML = `
            <div>
                ${label}
                <span class="${cleared ? 'clear' : ''}">
                    ${cleared ? '✔' : ''}
                </span>
            </div>

            <a class="btn"
                href="ar.html?spot=${id}">
                ARを読む
            </a>
        `;

            spotList.appendChild(div);

        });

        // 取得数表示
        const clearCount =
            SPOTS.filter(
                ({ id }) => localStorage.getItem(id)
            ).length;

        document.getElementById("progress").textContent =
            `スタンプ ${clearCount}/${SPOTS.length}`;

        // デバッグボタン作成
        const testBtn =
            document.createElement("button");

        testBtn.textContent =
            "全取得";

        testBtn.onclick = () => {

            SPOTS.forEach(({ id }) =>
                localStorage.setItem(id, "clear")
            );

            location.reload();
        };

        const resetBtn =
            document.createElement("button");

        resetBtn.textContent =
            "リセット";

        resetBtn.onclick = () => {

            localStorage.clear();

            location.reload();
        };

        // debugAreaへ追加
        const debugArea =
            document.getElementById("debugArea");

        debugArea.appendChild(testBtn);
        debugArea.appendChild(resetBtn);

    </script>


</body>

</html>
