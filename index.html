<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタンプラリー</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .spot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #ddd;
    }

    .btn {
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
    }

    .clear {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>ARスタンプラリー</h1>

  <div class="spot">
    <div>
      🏯 神社
      <span id="jinja-status"></span>
    </div>

    <a class="btn" href="ar.html?spot=jinja">
      ARを読む
    </a>
  </div>

  <div class="spot">
    <div>
      🌸 公園
      <span id="park-status"></span>
    </div>

    <a class="btn" href="ar.html?spot=park">
      ARを読む
    </a>
  </div>
</div>

<script>

function updateStatus(id) {

  const el = document.getElementById(id + '-status');

  if(localStorage.getItem(id)) {
    el.textContent = '✔';
    el.classList.add('clear');
  }
}

updateStatus('jinja');
updateStatus('park');

</script>

</body>
</html>
