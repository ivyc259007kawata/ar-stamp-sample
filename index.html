<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARスタンプラリー</title>
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <main>
    <div class="card">
      <h1>ARスタンプラリー</h1>
      <p><a href="map.html">会場マップ</a></p>
      <p><a href="stamp.html">スタンプ一覧</a></p>
    </div>
  </main>
  <footer class="footer">
    <a href="index.html">ホーム</a>
    <a href="map.html">地図</a>
    <a href="stamp.html">スタンプ</a>
  </footer>

  <script>
    // ★スポットを追加するときはここだけ編集
    const SPOTS = [
      { id: 'jinja', label: '🏯 神社' },
      { id: 'park', label: '🌸 公園' },
      { id: 'libra', label: '📚 図書館' },
    ];

    const card = document.querySelector('.card');

    SPOTS.forEach(({ id, label }) => {
      const cleared = localStorage.getItem(id);
      const div = document.createElement('div');
      div.className = 'spot';
      div.innerHTML = `
      <div>
        ${label}
        <span class="${cleared ? 'clear' : ''}">${cleared ? '✔' : ''}</span>
      </div>
      <a class="btn" href="ar.html?spot=${id}">ARを読む</a>
    `;
      card.appendChild(div);
    });
  </script>
</body>

</html>
